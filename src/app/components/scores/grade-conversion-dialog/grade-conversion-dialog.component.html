<div class="min-h-full w-full">
  <div class="flex justify-between items-center p-4 sm:p-6 border-b">
    <h2 class="text-xl sm:text-2xl font-bold text-gray-800">Bảng quy đổi điểm</h2>
    <button class="close-button w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors" (click)="close()">
      <i class="fas fa-times text-gray-600"></i>
    </button>
  </div>

  <div class="p-4 sm:p-6">
    <div class="overflow-x-auto -mx-4 sm:mx-0 sm:rounded-lg shadow">
      <table class="min-w-full divide-y divide-gray-200">
        <thead>
          <tr class="bg-gray-50">
            <th class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Thang 10
            </th>
            <th class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Thang 4
            </th>
            <th class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Điểm chữ
            </th>
            <th class="px-3 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              Xếp loại
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let grade of gradeConversion" 
              class="transition-colors hover:bg-gray-50"
              [ngClass]="getGradeRowClass(grade)">
            <td class="px-3 sm:px-6 py-3 sm:py-4 whitespace-nowrap text-sm font-medium" [ngClass]="getGradeTextClass(grade)">
              {{ grade.scale10 }}
            </td>
            <td class="px-3 sm:px-6 py-3 sm:py-4 whitespace-nowrap text-sm">
              {{ grade.scale4 }}
            </td>
            <td class="px-3 sm:px-6 py-3 sm:py-4 whitespace-nowrap text-sm font-semibold" [ngClass]="getGradeTextClass(grade)">
              {{ grade.letter }}
            </td>
            <td class="px-3 sm:px-6 py-3 sm:py-4 whitespace-nowrap text-sm">
              {{ grade.classification }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="p-4 sm:p-6 border-t">
    <button class="w-full sm:w-auto px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-2 mx-auto justify-center" (click)="close()">
      <i class="fas fa-check"></i>
      <span>Đóng</span>
    </button>
  </div>
</div>
