<div class="feedback-container">
  <div class="feedback-content">
    <div class="emoji-container" [@bounceAnimation]="bounceState" (click)="cycleEmoji()">
      {{ emojis[currentEmojiIndex] }}
    </div>
    <h2 class="feedback-title">Góp ý cho KMA Legend</h2>

    <form [formGroup]="feedbackForm" (ngSubmit)="onSubmit()" class="feedback-form">
      <div class="form-group">
        <label for="name">Họ và tên</label>
        <div class="input-container">
          <input 
            type="text" 
            id="name"
            formControlName="name" 
            placeholder="Nhập họ và tên của bạn"
            [class.error]="feedbackForm.get('name')?.invalid && feedbackForm.get('name')?.touched"
          >
          <span class="focus-border"></span>
        </div>
        <span class="error-message" *ngIf="feedbackForm.get('name')?.invalid && feedbackForm.get('name')?.touched">
          {{ getErrorMessage('name') }}
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-container">
          <input 
            type="email" 
            id="email"
            formControlName="email" 
            placeholder="Nhập email của bạn"
            [class.error]="feedbackForm.get('email')?.invalid && feedbackForm.get('email')?.touched"
          >
          <span class="focus-border"></span>
        </div>
        <span class="error-message" *ngIf="feedbackForm.get('email')?.invalid && feedbackForm.get('email')?.touched">
          {{ getErrorMessage('email') }}
        </span>
      </div>

      <div class="form-group">
        <label for="message">Nội dung góp ý</label>
        <div class="input-container">
          <textarea 
            id="message"
            formControlName="message" 
            placeholder="Nhập nội dung góp ý của bạn" 
            rows="5"
            [class.error]="feedbackForm.get('message')?.invalid && feedbackForm.get('message')?.touched"
          ></textarea>
          <span class="focus-border"></span>
        </div>
        <span class="error-message" *ngIf="feedbackForm.get('message')?.invalid && feedbackForm.get('message')?.touched">
          {{ getErrorMessage('message') }}
        </span>
      </div>

      <button type="submit" 
              class="feedback-button" 
              [disabled]="feedbackForm.invalid || isSubmitting">
        <span class="button-icon">{{ isSubmitting ? '📨' : '✉️' }}</span>
        {{ isSubmitting ? 'Đang gửi...' : 'Gửi góp ý' }}
      </button>
    </form>
  </div>
</div>
