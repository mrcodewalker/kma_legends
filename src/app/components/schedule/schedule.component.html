<!-- Main Container -->
<div class="schedule-container w-full">
  <!-- Student Info Card -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-800 shadow-lg p-4 sm:p-6 mb-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold text-white">
          <i class="fas fa-user-graduate mr-2"></i>
          Lịch học của {{studentInfo?.display_name}}
        </h1>
        <p class="text-blue-100 mt-1">
          <i class="fas fa-id-card mr-2"></i>
          MSSV: {{studentInfo?.student_code}}
        </p>
        <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-sm text-blue-200">
          <span *ngIf="studentInfo?.gender">
            <i class="fas fa-venus-mars mr-1"></i>{{studentInfo.gender}}
          </span>
          <span *ngIf="studentInfo?.birthday">
            <i class="fas fa-birthday-cake mr-1"></i>{{studentInfo.birthday}}
          </span>
          <span *ngIf="studentInfo?.phone">
            <i class="fas fa-phone mr-1"></i>{{studentInfo.phone}}
          </span>
          <span *ngIf="studentInfo?.email">
            <i class="fas fa-envelope mr-1"></i>{{studentInfo.email}}
          </span>
          <span *ngIf="studentInfo?.birth_place">
            <i class="fas fa-map-marker-alt mr-1"></i>{{studentInfo.birth_place}}
          </span>
        </div>
      </div>
      <div class="flex flex-col sm:flex-row items-center gap-3">
        <button (click)="showColorLegend = !showColorLegend"
          class="bg-white/20 hover:bg-white/30 text-white font-semibold py-2 px-4 rounded-lg flex items-center w-full sm:w-auto justify-center transition-all duration-200">
          <i class="fas fa-palette mr-2"></i>
          Màu môn học
        </button>
        <button (click)="exportToICS()"
          class="bg-white hover:bg-blue-50 text-blue-700 font-semibold py-2 px-4 rounded-lg flex items-center w-full sm:w-auto justify-center transition-all duration-200 shadow-sm hover:shadow">
          <i class="fas fa-calendar-alt mr-2"></i>
          Xuất lịch (ICS)
        </button>
        <button (click)="logout()"
          class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg flex items-center w-full sm:w-auto justify-center transition-all duration-200 shadow-sm hover:shadow">
          <i class="fas fa-sign-out-alt mr-2"></i>
          Đăng xuất
        </button>
      </div>
    </div>
  </div>

  <!-- Color Legend Panel -->
  <div *ngIf="showColorLegend" class="bg-white border border-gray-200 rounded-lg shadow-md mx-0 mb-4 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-semibold text-gray-700 flex items-center gap-2">
        <i class="fas fa-palette text-blue-500"></i> Màu môn học
      </h3>
      <div class="flex items-center gap-2">
        <button (click)="resetColors()"
          class="text-xs text-gray-500 hover:text-red-500 border border-gray-200 hover:border-red-300 px-2 py-1 rounded-lg transition-colors flex items-center gap-1">
          <i class="fas fa-undo"></i> Reset mặc định
        </button>
        <button (click)="showColorLegend = false" class="text-gray-400 hover:text-gray-600">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
      <div *ngFor="let name of courseNames"
        class="flex items-center gap-3 p-2 rounded-lg border border-gray-100 hover:bg-gray-50">
        <input type="color" [value]="courseColorMap[name]" (input)="updateCourseColor(name, $any($event.target).value)"
          class="w-8 h-8 rounded cursor-pointer border-0 p-0 bg-transparent" title="Chọn màu cho {{name}}">
        <div class="w-3 h-full min-h-[2rem] rounded-sm flex-shrink-0" [style.background]="courseColorMap[name]"></div>
        <span class="text-sm text-gray-700 truncate" [title]="name">{{name}}</span>
      </div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600"></div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
    <div class="flex items-center">
      <i class="fas fa-exclamation-circle mr-2"></i>
      <span class="block sm:inline">{{ error }}</span>
    </div>
  </div>

  <!-- Calendar -->
  <div *ngIf="!loading && !error" class="calendar-wrapper w-full h-full">
    <full-calendar [options]="calendarOptions"></full-calendar>
  </div>
</div>
